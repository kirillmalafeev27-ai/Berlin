<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>facerig — game preview</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden;
    font: 14px/1.45 system-ui, sans-serif; background: #14171b; color: #dde3ea; }
  #viewport { width: 100vw; height: 100vh; display: block; touch-action: none; }
  #bar {
    position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
    display: flex; gap: 8px; align-items: center; width: min(760px, calc(100vw - 32px));
    background: rgba(20,23,27,.9); border: 1px solid #3a4048; border-radius: 12px;
    padding: 10px 12px; backdrop-filter: blur(6px);
  }
  #say {
    flex: 1; background: #22262b; color: #eee; border: 1px solid #3a4048;
    border-radius: 8px; padding: 10px 12px; font: inherit; outline: none;
  }
  #say:focus { border-color: #4da3ff; }
  button {
    background: #2f6fed; color: white; border: 0; border-radius: 8px;
    padding: 10px 18px; font: inherit; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: default; }
  #topbar {
    position: fixed; left: 12px; top: 12px; display: flex; gap: 8px; align-items: center;
    background: rgba(20,23,27,.85); border: 1px solid #3a4048; border-radius: 8px; padding: 6px 10px;
  }
  #topbar a { color: #8fd0ff; text-decoration: none; }
  #topbar button { padding: 6px 10px; background: #333a44; }
  #voice { width: 150px; background: #22262b; color: #eee; border: 1px solid #3a4048;
    border-radius: 8px; padding: 6px 8px; font: inherit; }
  #status {
    position: fixed; left: 50%; bottom: 76px; transform: translateX(-50%);
    max-width: 70vw; text-align: center; color: #9aa4b0; pointer-events: none;
    text-shadow: 0 1px 4px #000;
  }
  #subtitle {
    position: fixed; left: 50%; bottom: 110px; transform: translateX(-50%);
    max-width: 70vw; text-align: center; font-size: 18px; color: #fff;
    text-shadow: 0 1px 6px #000; pointer-events: none;
  }
  #hint { position: fixed; left: 50%; top: 44%; transform: translate(-50%,-50%);
    color: #8b94a0; text-align: center; pointer-events: none; }
  input[type=file] { display: none; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.min.js",
    "three/addons/": "./vendor/"
  }
}
</script>
</head>
<body>
<canvas id="viewport"></canvas>
<div id="hint">Drop a <b>rigged</b> .glb here — or export one from the <a href="./index.html" style="color:#8fd0ff">calibration tool</a>;<br>
the last export opens here automatically.</div>
<div id="topbar">
  <a href="./index.html">← calibration tool</a>
  <button id="loadBtn">Load rigged GLB…</button>
  <input id="voice" placeholder="voice id (optional)">
</div>
<div id="subtitle"></div>
<div id="status"></div>
<div id="bar">
  <input id="say" placeholder="Type a line — the character speaks it via ElevenLabs…"
         value="Guten Tag! Ich bin Polizist. Wie kann ich Ihnen helfen?">
  <button id="speak">Speak</button>
</div>
<input type="file" id="fileGlb" accept=".glb,.gltf">
<script type="module" src="./js/preview.js"></script>
</body>
</html>
